<main class="form-container">
  <section class="login">
    <h2>Iniciar sesión</h2>

    <form [formGroup]="loginForm" (ngSubmit)="ingresar()">
      
      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" formControlName="email">
      @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
        <small class="error-text">Ingresa un correo válido.</small>
      }

      <label for="password">Contraseña:</label>
      <input type="password" id="password" formControlName="password">
      @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
        <small class="error-text">La contraseña es obligatoria.</small>
      }

      <button type="submit">Entrar</button>
    </form>

    <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
  </section>
</main>
