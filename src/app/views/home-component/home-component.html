<section class="hero">
    <h1>Descubre, comparte y disfruta las mejores recetas caseras</h1>
    <p>Encuentra inspiración culinaria creada por cocineros de todo el mundo.</p>
    <button routerLink="/catalogo">Explorar recetas</button> 
</section>

<section class="destacadas">
    <h2>Recetas destacadas</h2>
    <div class="grid-recetas">
        @for (receta of recetasDestacadas; track receta.id) {
            <article class="card" [routerLink]="['/detalle', receta.id]">
                <img [src]="receta.imagen" [alt]="receta.titulo">
                <h3>{{ receta.titulo }}</h3>
                <p>{{ receta.descripcion }}</p>
            </article>
        } @empty {
            <p>No hay recetas destacadas aún.</p>
        }
    </div>
</section>
